settings:
  idle: 1.0
  timeout: 120
  screenshot:
    format: "png"
    quality: 95

# Variables for Windows registry testfunctions testing
variables:
  test_key_path:
    type: string
    value: "HKEY_CURRENT_USER\\Software\\TestApp"
    description: "Test registry key path"
  
  system_key_path:
    type: string
    value: "HKEY_LOCAL_MACHINE\\Software\\Microsoft\\Windows\\CurrentVersion"
    description: "System registry key for testing"
  
  test_string_value:
    type: string
    value: "TestStringValue"
    description: "Test string value for registry"
  
  test_dword_value:
    type: integer
    value: 42
    description: "Test DWORD value for registry"
  
  current_version:
    type: string
    value: "10.0"
    description: "Expected Windows version"

# Test definitions for Windows registry testfunctions
tests:
  # Registry key existence tests
  - name: test_registry_key_exists_system
    description: 'Test registry_key_exists with system key'
    function: registry_key_exists
    parameter:
      key_path: '{{system_key_path}}'
  
  - name: test_registry_key_exists_custom
    description: 'Test registry_key_exists with custom created key'
    function: registry_key_exists
    parameter:
      key_path: '{{test_key_path}}'
  
  - name: test_registry_key_does_not_exist
    description: 'Test registry_key_exists with non-existent key'
    function: registry_key_exists
    parameter:
      key_path: 'HKEY_CURRENT_USER\\Software\\NonExistentApp'
  
  # Registry value tests
  - name: test_registry_value_string
    description: 'Test registry_value_matches with string value'
    function: registry_value_matches
    parameter:
      key_path: '{{test_key_path}}'
      value_name: 'StringValue'
      expected_value: '{{test_string_value}}'
      value_type: 'REG_SZ'
  
  - name: test_registry_value_dword
    description: 'Test registry_value_matches with DWORD value'
    function: registry_value_matches
    parameter:
      key_path: '{{test_key_path}}'
      value_name: 'DwordValue'
      expected_value: '{{test_dword_value}}'
      value_type: 'REG_DWORD'
  
  - name: test_registry_value_system
    description: 'Test registry_value_matches with system value'
    function: registry_value_matches
    parameter:
      key_path: '{{system_key_path}}'
      value_name: 'CurrentVersion'
      expected_value: '{{current_version}}'
      value_type: 'REG_SZ'
  
  # Test with short hive names
  - name: test_registry_key_short_hive
    description: 'Test registry key with short hive name (HKCU)'
    function: registry_key_exists
    parameter:
      key_path: 'HKCU\\Software\\TestApp'
  
  - name: test_registry_value_short_hive
    description: 'Test registry value with short hive name (HKLM)'
    function: registry_value_matches
    parameter:
      key_path: 'HKLM\\Software\\Microsoft\\Windows\\CurrentVersion'
      value_name: 'CurrentVersion'
      expected_value: '{{current_version}}'

actions:
  # Create test registry entries
  - command:
      name: "Create Test Registry Key"
      description: "Create test registry key structure"
      command: |
        reg add "{{test_key_path}}" /f
      shell: true
  
  - command:
      name: "Add String Registry Value"
      description: "Add test string value to registry"
      command: |
        reg add "{{test_key_path}}" /v "StringValue" /t REG_SZ /d "{{test_string_value}}" /f
      shell: true
  
  - command:
      name: "Add DWORD Registry Value"
      description: "Add test DWORD value to registry"
      command: |
        reg add "{{test_key_path}}" /v "DwordValue" /t REG_DWORD /d {{test_dword_value}} /f
      shell: true
  
  - command:
      name: "Add Binary Registry Value"
      description: "Add test binary value to registry"
      command: |
        reg add "{{test_key_path}}" /v "BinaryValue" /t REG_BINARY /d "48656c6c6f" /f
      shell: true
  
  # Run registry key existence tests
  - test: test_registry_key_exists_system
  - test: test_registry_key_exists_custom
  - test: test_registry_key_does_not_exist
  
  # Run registry value tests
  - test: test_registry_value_string
  - test: test_registry_value_dword
  - test: test_registry_value_system
  - test: test_registry_key_short_hive
  - test: test_registry_value_short_hive
  
  # Cleanup test registry entries
  - command:
      name: "Cleanup Test Registry Key"
      description: "Remove test registry key and all values"
      command: |
        reg delete "{{test_key_path}}" /f
      shell: true