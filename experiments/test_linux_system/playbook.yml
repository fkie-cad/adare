settings:
  idle: 1.0
  timeout: 120
  screenshot:
    format: "png"
    quality: 95
  continue_on_test_failure: true

# Variables for Linux system testing
variables:
  username:
    type: string
    value: "adare"
    description: "System username"
  
  active_service:
    type: string
    value: "systemd-resolved"
    description: "Service that should be active"
  
  inactive_service:
    type: string
    value: "nonexistent-service"
    description: "Service that should be inactive"
  
  running_process:
    type: string
    value: "systemd"
    description: "Process that should be running"
  
  test_log:
    type: path
    value: "/var/log/syslog"
    description: "System log file"

# Test definitions for Linux system functions
tests:
  # Service status tests
  - name: test_service_active
    description: 'Test system_service_status with active service'
    function: system_service_status
    parameter:
      service_name: '{{active_service}}'
      expected_status: 'active'
  
  - name: test_service_inactive
    description: 'Test system_service_status with inactive service'
    function: system_service_status
    parameter:
      service_name: '{{inactive_service}}'
      expected_status: 'inactive'
  
  # Process running tests
  - name: test_process_running_single
    description: 'Test process_running with single instance'
    function: process_running
    parameter:
      process_name: '{{running_process}}'
      min_instances: 1
  
  - name: test_process_not_running
    description: 'Test process_running with non-existent process'
    function: process_running
    parameter:
      process_name: 'nonexistent-process-12345'
      min_instances: 1
  
  # User existence tests
  - name: test_user_exists
    description: 'Test user_exists with existing user'
    function: user_exists
    parameter:
      username: '{{username}}'
  
  - name: test_user_does_not_exist
    description: 'Test user_exists with non-existent user'
    function: user_exists
    parameter:
      username: 'nonexistent-user-12345'
  
  # Log entry tests
  - name: test_log_entry_systemd
    description: 'Test log_entry_exists with systemd pattern'
    function: log_entry_exists
    parameter:
      log_file: '{{test_log}}'
      pattern: 'systemd'
      max_lines: 1000
  
  - name: test_log_entry_not_found
    description: 'Test log_entry_exists with non-existent pattern'
    function: log_entry_exists
    parameter:
      log_file: '{{test_log}}'
      pattern: 'nonexistent-log-pattern-12345'
      max_lines: 100

actions:
  # Run all system tests
  - test: test_service_active
  - test: test_service_inactive
  - test: test_process_running_single
  - test: test_process_not_running
  - test: test_user_exists
  - test: test_user_does_not_exist
  - test: test_log_entry_systemd
  - test: test_log_entry_not_found