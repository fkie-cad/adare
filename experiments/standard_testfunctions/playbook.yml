settings:
  idle: 1.0
  timeout: 120
  screenshot:
    format: "png"
    quality: 95

# Variables for standard testfunctions testing
variables:
  username:
    type: string
    value: "adare"
    description: "System username"
  
  test_dir:
    type: path
    value: "/home/{{username}}/testfunctions_test"
    description: "Base directory for testing"
  
  test_file:
    type: path
    value: "{{test_dir}}/test_file.txt"
    description: "Test file path"
  
  test_csv:
    type: path
    value: "{{test_dir}}/test_data.csv"
    description: "Test CSV file path"
  
  test_json:
    type: path
    value: "{{test_dir}}/test_config.json"
    description: "Test JSON file path"
  
  test_sqlite:
    type: path
    value: "{{test_dir}}/test_database.db"
    description: "Test SQLite database path"
  
  expected_hash:
    type: string
    value: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
    description: "SHA256 hash of empty file"

# Test definitions for all standard testfunctions
tests:
  # File existence tests
  - name: test_file_exists
    description: 'Test file_exists function'
    function: file_exists
    parameter:
      dst: '{{test_file}}'
  
  - name: test_file_does_not_exist
    description: 'Test file_does_not_exist function'
    function: file_does_not_exist
    parameter:
      dst: '{{test_dir}}/nonexistent_file.txt'
  
  # Directory tests
  - name: test_dir_exists
    description: 'Test dir_exists function'
    function: dir_exists
    parameter:
      dst: '{{test_dir}}'
  
  - name: test_dir_does_not_exist
    description: 'Test dir_does_not_exist function'
    function: dir_does_not_exist
    parameter:
      dst: '{{test_dir}}/nonexistent_dir'
  
  - name: test_dir_content
    description: 'Test dir_content function'
    function: dir_content
    parameter:
      dst: '{{test_dir}}'
      files: ['test_file.txt', 'test_data.csv', 'test_config.json', 'test_database.db']
  
  # File content tests
  - name: test_file_content_equals
    description: 'Test file_content_equals function'
    function: file_content_equals
    parameter:
      dst: '{{test_file}}'
      content: 'This is test content for file testing'
  
  - name: test_file_content_matches_regex
    description: 'Test file_content_matches_regex function'
    function: file_content_matches_regex
    parameter:
      dst: '{{test_file}}'
      regex: '^This is test.*testing$'
  
  # CSV tests
  - name: test_csv_contains_line
    description: 'Test csv_contains_line function'
    function: csv_contains_line
    parameter:
      dst: '{{test_csv}}'
      entry: ['1', 'John Doe', 'john@example.com', 'Admin']
  
  # JSON tests
  - name: test_json_contains_key
    description: 'Test json_contains_key function'
    function: json_contains_key
    parameter:
      dst: '{{test_json}}'
      key_path: 'database.host'
  
  - name: test_json_value_matches
    description: 'Test json_value_matches function'
    function: json_value_matches
    parameter:
      dst: '{{test_json}}'
      key_path: 'app.name'
      expected_value: 'TestApp'
  
  - name: test_json_array_contains
    description: 'Test json_array_contains function'
    function: json_array_contains
    parameter:
      dst: '{{test_json}}'
      array_path: 'features'
      expected_element: 'logging'
  
  # SQLite tests
  - name: test_sqlite_query_result
    description: 'Test sqlite_query_result function'
    function: sqlite_query_result
    parameter:
      dst: '{{test_sqlite}}'
      query: 'SELECT COUNT(*) as count FROM users'
      expected_rows: 1
  
  # File hash test
  - name: test_file_hash_matches
    description: 'Test file_hash_matches function'
    function: file_hash_matches
    parameter:
      dst: '{{test_dir}}/empty_file.txt'
      expected_hash: '{{expected_hash}}'
      hash_type: 'sha256'
  
  # File permissions test
  - name: test_file_permissions
    description: 'Test file_permissions function'
    function: file_permissions
    parameter:
      dst: '{{test_file}}'
      expected_permissions: '644'
  
  # File timestamps test
  - name: test_file_timestamps
    description: 'Test file_timestamps function'
    function: file_timestamps
    parameter:
      dst: '{{test_file}}'
      timestamp_type: 'modified'
      comparison_type: 'within_last'
      within_duration: '5m'

actions:
  # Setup test environment
  - command:
      name: "Create Test Directory"
      description: "Create base directory for testing"
      command: "mkdir -p {{test_dir}}"
      shell: true
  
  # Create test files
  - command:
      name: "Create Test File"
      description: "Create test file with content"
      command: |
        echo "This is test content for file testing" > {{test_file}}
        chmod 644 {{test_file}}
      shell: true
  
  - command:
      name: "Create Empty File"
      description: "Create empty file for hash testing"
      command: "touch {{test_dir}}/empty_file.txt"
      shell: true
  
  - command:
      name: "Create Test CSV"
      description: "Create test CSV file"
      command: |
        cat > {{test_csv}} << 'EOF'
        id,name,email,role
        1,John Doe,john@example.com,Admin
        2,Jane Smith,jane@example.com,User
        3,Bob Johnson,bob@example.com,Manager
        EOF
      shell: true
  
  - command:
      name: "Create Test JSON"
      description: "Create test JSON configuration file"
      command: |
        cat > {{test_json}} << 'EOF'
        {
          "app": {
            "name": "TestApp",
            "version": "1.0.0",
            "debug": true
          },
          "database": {
            "host": "localhost",
            "port": 5432,
            "name": "testdb"
          },
          "features": ["logging", "analytics", "reporting"],
          "settings": {
            "timeout": 30,
            "retries": 3
          }
        }
        EOF
      shell: true
  
  - command:
      name: "Create Test SQLite Database"
      description: "Create test SQLite database with sample data"
      command: |
        sqlite3 {{test_sqlite}} << 'EOF'
        CREATE TABLE users (
          id INTEGER PRIMARY KEY,
          name TEXT NOT NULL,
          email TEXT UNIQUE NOT NULL,
          created_at DATETIME DEFAULT CURRENT_TIMESTAMP
        );
        INSERT INTO users (name, email) VALUES 
          ('John Doe', 'john@example.com'),
          ('Jane Smith', 'jane@example.com'),
          ('Bob Johnson', 'bob@example.com');
        EOF
      shell: true
  
  # Run all tests
  - test: test_file_exists
  - test: test_file_does_not_exist
  - test: test_dir_exists
  - test: test_dir_does_not_exist
  - test: test_dir_content
  - test: test_file_content_equals
  - test: test_file_content_matches_regex
  - test: test_csv_contains_line
  - test: test_json_contains_key
  - test: test_json_value_matches
  - test: test_json_array_contains
  - test: test_sqlite_query_result
  - test: test_file_hash_matches
  - test: test_file_permissions
  - test: test_file_timestamps
  
  # Cleanup
  - command:
      name: "Cleanup Test Directory"
      description: "Remove test directory and files"
      command: "rm -rf {{test_dir}}"
      shell: true