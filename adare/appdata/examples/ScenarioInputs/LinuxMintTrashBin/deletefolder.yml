- name: contenttrashbinfiles
  description: "check content of Trash Bin"
  type: dir_content
  params:
    files:
      - testfolder
    dst: /home/vagrant/.local/share/Trash/files
- name: existencefilemetadata
  description: "check if deletion metadata for file is exisiting"
  type: is_file
  params:
    dst: /home/vagrant/.local/share/Trash/info/testfolder.trashinfo
- name: checkcontentmetadata
  description: "check if deletion metadata match predictet format"
  type: regex_match
  params:
    regex: "\[Trash Info\]\nPath=/home/vagrant/testfolder\nDeletionDate=2022-[0-3][0-9]-[0-3][0-9]T[0-2][0-9]:[0-5][0-9]:[0-5][0-9]\n"
    dst: /home/vagrant/.local/share/Trash/info/testfolder.trashinfo