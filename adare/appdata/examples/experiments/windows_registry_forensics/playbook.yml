settings:
  idle: 1.0
  timeout: 120
  screenshot:
    format: "png"
    quality: 95

# Variables for Windows registry forensic analysis
variables:
  username:
    type: string
    value: "testuser"
    description: "Windows username"
  
  app_name:
    type: string
    value: "ForensicTestApp"
    description: "Application name for registry testing"
  
  install_path:
    type: path
    value: "C:\\Program Files\\{{app_name}}"
    description: "Application install path"
  
  version_number:
    type: string
    value: "1.2.3"
    description: "Application version"
  
  registry_file:
    type: path
    value: "C:\\Users\\{{username}}\\registry_test.json"
    description: "JSON file for combined registry-JSON testing"

# Test definitions using Windows registry forensic methods
tests:
  - name: windows_version_exists
    description: 'Verify Windows version registry key exists'
    function: registry_key_exists
    parameter:
      key_path: 'HKEY_LOCAL_MACHINE\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion'
  
  - name: current_user_environment_exists
    description: 'Check current user environment variables registry key'
    function: registry_key_exists
    parameter:
      key_path: 'HKEY_CURRENT_USER\\Environment'
  
  - name: app_install_key_exists
    description: 'Verify application install registry key exists'
    function: registry_key_exists
    parameter:
      key_path: 'HKEY_LOCAL_MACHINE\\SOFTWARE\\{{app_name}}'
  
  - name: app_version_matches
    description: 'Check application version in registry'
    function: registry_value_matches
    parameter:
      key_path: 'HKEY_LOCAL_MACHINE\\SOFTWARE\\{{app_name}}'
      value_name: 'Version'
      expected_value: '{{version_number}}'
      value_type: 'REG_SZ'
  
  - name: app_install_path_matches
    description: 'Verify application install path'
    function: registry_value_matches
    parameter:
      key_path: 'HKEY_LOCAL_MACHINE\\SOFTWARE\\{{app_name}}'
      value_name: 'InstallPath'
      expected_value: '{{install_path}}'
      value_type: 'REG_SZ'
  
  - name: app_installed_flag
    description: 'Check if application installed flag is set'
    function: registry_value_matches
    parameter:
      key_path: 'HKEY_LOCAL_MACHINE\\SOFTWARE\\{{app_name}}'
      value_name: 'Installed'
      expected_value: 1
      value_type: 'REG_DWORD'
  
  - name: registry_json_timestamp_test
    description: 'Verify registry modification timestamp matches JSON with tolerance'
    function: json_value_matches
    parameter:
      dst: '{{registry_file}}'
      key_path: 'registry_modification.timestamp'
      expected_value: '{{ registry_timestamp | format("%Y-%m-%dT%H:%M:%SZ") | tolerance(5, -5) }}'

actions:
  - command:
      name: "Create Application Registry Entries"
      description: "Create test registry entries for forensic analysis"
      command: |
        reg add "HKLM\\SOFTWARE\\{{app_name}}" /v "Version" /t REG_SZ /d "{{version_number}}" /f
        reg add "HKLM\\SOFTWARE\\{{app_name}}" /v "InstallPath" /t REG_SZ /d "{{install_path}}" /f
        reg add "HKLM\\SOFTWARE\\{{app_name}}" /v "Installed" /t REG_DWORD /d 1 /f
      shell: true
  
  - save_timestamp:
      description: "Save timestamp after registry modification"
      variable: registry_timestamp
  
  - idle:
      duration: 2.0
      description: "Wait for registry changes to be committed"
  
  - command:
      name: "Create Registry Test JSON"
      description: "Create JSON file with registry modification timestamp"
      command: |
        echo {
        echo   "registry_modification": {
        echo     "timestamp": "%date:~10,4%-%date:~4,2%-%date:~7,2%T%time:~0,2%:%time:~3,2%:%time:~6,2%Z",
        echo     "app_name": "{{app_name}}",
        echo     "operation": "create_entries"
        echo   },
        echo   "forensic_data": {
        echo     "version": "{{version_number}}",
        echo     "path": "{{install_path}}"
        echo   }
        echo } > "{{registry_file}}"
      shell: true
  
  # Run registry forensic tests
  - test: windows_version_exists
  - test: current_user_environment_exists
  - test: app_install_key_exists
  - test: app_version_matches
  - test: app_install_path_matches
  - test: app_installed_flag
  - test: registry_json_timestamp_test