settings:
  idle: 1.0
  timeout: 120
  screenshot:
    format: "png"
    quality: 95
  continue_on_test_failure: true

# Variables for Windows filesystem testing
variables:
  username:
    type: string
    value: "adare"
    description: "System username"

  test_dir:
    type: path
    value: "C:\\Users\\{{username}}\\test_filesystem"
    description: "Base directory for testing"

  test_file:
    type: path
    value: "{{test_dir}}\\test_file.txt"
    description: "Test file path"

  test_content:
    type: string
    value: "Windows filesystem test content"
    description: "Content for test file"

  binary_content:
    type: string
    value: "Binary data: \x89PNG\r\n\x1a\n"
    description: "Binary content with escape sequences"

  expected_hash:
    type: string
    value: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
    description: "SHA256 hash of empty file"

# Test definitions for filesystem functions
tests:
  # File existence tests
  - name: test_file_exists_positive
    description: 'Test file_exists with existing file'
    function: file_exists
    parameter:
      dst: '{{test_file}}'

  - name: test_file_exists_negative
    description: 'Test file_exists with non-existent file'
    function: file_exists
    expect_to_fail: true
    parameter:
      dst: '{{test_dir}}\\nonexistent.txt'

  - name: test_file_does_not_exist_positive
    description: 'Test file_does_not_exist with non-existent file'
    function: file_does_not_exist
    parameter:
      dst: '{{test_dir}}\\should_not_exist.txt'

  - name: test_file_does_not_exist_negative
    description: 'Test file_does_not_exist with existing file'
    function: file_does_not_exist
    expect_to_fail: true
    parameter:
      dst: '{{test_file}}'

  # Directory existence tests
  - name: test_dir_exists_positive
    description: 'Test dir_exists with existing directory'
    function: dir_exists
    parameter:
      dst: '{{test_dir}}'

  - name: test_dir_exists_negative
    description: 'Test dir_exists with non-existent directory'
    function: dir_exists
    expect_to_fail: true
    parameter:
      dst: '{{test_dir}}\\nonexistent_dir'

  - name: test_dir_does_not_exist_positive
    description: 'Test dir_does_not_exist with non-existent directory'
    function: dir_does_not_exist
    parameter:
      dst: '{{test_dir}}\\should_not_exist_dir'

  - name: test_dir_does_not_exist_negative
    description: 'Test dir_does_not_exist with existing directory'
    function: dir_does_not_exist
    expect_to_fail: true
    parameter:
      dst: '{{test_dir}}'

  # Directory content tests
  - name: test_dir_content_exact
    description: 'Test dir_content with exact file list'
    function: dir_content
    parameter:
      dst: '{{test_dir}}'
      files: ['test_file.txt', 'empty_file.txt', 'subdir', 'binary_file.bin']

  - name: test_dir_content_missing_files
    description: 'Test dir_content with missing files (should fail)'
    function: dir_content
    expect_to_fail: true
    parameter:
      dst: '{{test_dir}}'
      files: ['test_file.txt', 'missing_file.txt']

  # File content tests
  - name: test_file_content_equals_positive
    description: 'Test file_content_equals with matching content'
    function: file_content_equals
    parameter:
      dst: '{{test_file}}'
      content: '{{test_content}}'

  - name: test_file_content_equals_negative
    description: 'Test file_content_equals with non-matching content'
    function: file_content_equals
    expect_to_fail: true
    parameter:
      dst: '{{test_file}}'
      content: 'Different content'

  - name: test_file_content_matches_regex_positive
    description: 'Test file_content_matches_regex with matching pattern'
    function: file_content_matches_regex
    parameter:
      dst: '{{test_file}}'
      regex: '^Windows.*content$'

  - name: test_file_content_matches_regex_negative
    description: 'Test file_content_matches_regex with non-matching pattern'
    function: file_content_matches_regex
    expect_to_fail: true
    parameter:
      dst: '{{test_file}}'
      regex: '^Linux.*content$'

  # File hash tests
  - name: test_file_hash_matches_positive
    description: 'Test file_hash_matches with correct hash'
    function: file_hash_matches
    parameter:
      dst: '{{test_dir}}\\empty_file.txt'
      expected_hash: '{{expected_hash}}'
      hash_type: 'sha256'

  - name: test_file_hash_matches_negative
    description: 'Test file_hash_matches with incorrect hash'
    function: file_hash_matches
    expect_to_fail: true
    parameter:
      dst: '{{test_file}}'
      expected_hash: '{{expected_hash}}'
      hash_type: 'sha256'

  # File timestamps tests
  - name: test_file_timestamps_within_last
    description: 'Test file_timestamps within last time'
    function: file_timestamps
    parameter:
      dst: '{{test_file}}'
      timestamp_type: 'modified'
      comparison_type: 'within_last'
      within_duration: '5m'

  - name: test_file_timestamps_not_within_last
    description: 'Test file_timestamps not within last time (should fail)'
    function: file_timestamps
    expect_to_fail: true
    parameter:
      dst: '{{test_file}}'
      timestamp_type: 'modified'
      comparison_type: 'within_last'
      within_duration: '1s'

  # File content contains tests
  - name: test_file_content_contains_string_positive
    description: 'Test file_content_contains with matching string'
    function: file_content_contains
    parameter:
      dst: '{{test_file}}'
      content: 'filesystem test'
      content_type: 'string'

  - name: test_file_content_contains_string_negative
    description: 'Test file_content_contains with non-matching string'
    function: file_content_contains
    expect_to_fail: true
    parameter:
      dst: '{{test_file}}'
      content: 'Linux system'
      content_type: 'string'

  - name: test_file_content_contains_bytes_positive
    description: 'Test file_content_contains with matching bytes'
    function: file_content_contains
    parameter:
      dst: '{{test_dir}}\\binary_file.bin'
      content: '{{binary_content}}'
      content_type: 'bytes'

  - name: test_file_content_contains_bytes_negative
    description: 'Test file_content_contains with non-matching bytes'
    function: file_content_contains
    expect_to_fail: true
    parameter:
      dst: '{{test_dir}}\\binary_file.bin'
      content: '\xff\xfe\xfd'
      content_type: 'bytes'

actions:
  # Setup test environment
  - command:
      name: "Create Test Directory"
      description: "Create base directory for testing"
      command: 'mkdir "{{test_dir}}"'
      shell: true

  - command:
      name: "Create Subdirectory"
      description: "Create subdirectory for content testing"
      command: 'mkdir "{{test_dir}}\\subdir"'
      shell: true

  - command:
      name: "Create Test File"
      description: "Create test file with content"
      command: 'echo {{test_content}} > "{{test_file}}"'
      shell: true

  - command:
      name: "Create Empty File"
      description: "Create empty file for hash testing"
      command: 'type nul > "{{test_dir}}\\empty_file.txt"'
      shell: true

  - command:
      name: "Create Binary File"
      description: "Create binary file for content contains testing"
      command: 'powershell -Command "[System.IO.File]::WriteAllBytes(\"{{test_dir}}\\binary_file.bin\", [System.Text.Encoding]::UTF8.GetBytes(\"{{binary_content}}\"))"'
      shell: true

  - idle:
      duration: 2.0
      description: "Wait to ensure timestamp differences"

  # Run all filesystem tests
  - test: test_file_exists_positive
  - test: test_file_exists_negative
  - test: test_file_does_not_exist_positive
  - test: test_file_does_not_exist_negative
  - test: test_dir_exists_positive
  - test: test_dir_exists_negative
  - test: test_dir_does_not_exist_positive
  - test: test_dir_does_not_exist_negative
  - test: test_dir_content_exact
  - test: test_dir_content_missing_files
  - test: test_file_content_equals_positive
  - test: test_file_content_equals_negative
  - test: test_file_content_matches_regex_positive
  - test: test_file_content_matches_regex_negative
  - test: test_file_hash_matches_positive
  - test: test_file_hash_matches_negative
  - test: test_file_timestamps_within_last
  - test: test_file_timestamps_not_within_last
  - test: test_file_content_contains_string_positive
  - test: test_file_content_contains_string_negative
  - test: test_file_content_contains_bytes_positive
  - test: test_file_content_contains_bytes_negative

  # Cleanup
  - command:
      name: "Cleanup Test Directory"
      description: "Remove test directory and files"
      command: 'rmdir /s /q "{{test_dir}}"'
      shell: true