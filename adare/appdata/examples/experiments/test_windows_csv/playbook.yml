settings:
  idle: 1.0
  timeout: 120
  screenshot:
    format: "png"
    quality: 95
  continue_on_test_failure: true

# Variables for Windows CSV testing
variables:
  username:
    type: string
    value: "adare"
    description: "System username"
  
  test_dir:
    type: path
    value: "C:\\Users\\{{username}}\\test_csv"
    description: "Base directory for CSV testing"
  
  users_csv:
    type: path
    value: "{{test_dir}}\\users.csv"
    description: "Users CSV file"

# Test definitions for CSV functions on Windows
tests:
  - name: test_csv_contains_line_windows
    description: 'Test csv_contains_line on Windows'
    function: csv.contains_line
    parameter:
      dst: '{{users_csv}}'
      entry: ['1', 'John Doe', 'john@example.com', 'Admin']

actions:
  # Setup test environment
  - command:
      name: "Create Test Directory"
      description: "Create base directory for CSV testing"
      command: 'mkdir "{{test_dir}}"'
      shell: true
  
  - command:
      name: "Create Users CSV"
      description: "Create users CSV file with sample data"
      command: |
        echo id,name,email,role > "{{users_csv}}"
        echo 1,John Doe,john@example.com,Admin >> "{{users_csv}}"
        echo 2,Jane Smith,jane@example.com,User >> "{{users_csv}}"
      shell: true
  
  # Run CSV tests
  - test: test_csv_contains_line_windows
  
  # Cleanup
  - command:
      name: "Cleanup Test Directory"
      description: "Remove test directory and files"
      command: 'rmdir /s /q "{{test_dir}}"'
      shell: true