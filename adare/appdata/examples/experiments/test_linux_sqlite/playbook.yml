settings:
  idle: 1.0
  timeout: 120
  screenshot:
    format: "png"
    quality: 95
  continue_on_test_failure: true

# Variables for Linux SQLite testing
variables:
  username:
    type: string
    value: "adare"
    description: "System username"
  
  test_dir:
    type: path
    value: "/home/{{username}}/test_sqlite"
    description: "Base directory for SQLite testing"
  
  test_db:
    type: path
    value: "{{test_dir}}/test.db"
    description: "Test SQLite database"

  shared_db:
    type: path
    value: "{{experiment_dir}}/shared/data/test.db"
    description: "Pre-created SQLite database with comprehensive test data"
  
  empty_db:
    type: path
    value: "{{test_dir}}/empty.db"
    description: "Empty SQLite database"

# Test definitions for SQLite functions
tests:
  # Basic query tests
  - name: test_sqlite_query_count
    description: 'Test sqlite_query_result with COUNT query'
    function: sqlite.query_result
    parameter:
      dst: '{{test_db}}'
      query: 'SELECT COUNT(*) as count FROM users'
      expected_rows: 1
  
  - name: test_sqlite_query_specific_result
    description: 'Test sqlite_query_result with specific expected result'
    function: sqlite.query_result
    parameter:
      dst: '{{test_db}}'
      query: 'SELECT COUNT(*) as count FROM users WHERE role = "Admin"'
      expected_result: [{"count": 2}]
  
  - name: test_sqlite_query_all_users
    description: 'Test sqlite_query_result returning all users'
    function: sqlite.query_result
    parameter:
      dst: '{{test_db}}'
      query: 'SELECT name, role FROM users ORDER BY id'
      expected_rows: 8
  
  - name: test_sqlite_query_single_user
    description: 'Test sqlite_query_result with single user lookup'
    function: sqlite.query_result
    parameter:
      dst: '{{test_db}}'
      query: 'SELECT * FROM users WHERE name = "John Doe"'
      expected_rows: 1
  
  - name: test_sqlite_query_no_results
    description: 'Test sqlite_query_result with query returning no results'
    function: sqlite.query_result
    parameter:
      dst: '{{test_db}}'
      query: 'SELECT * FROM users WHERE name = "Nonexistent User"'
      expected_rows: 0
  
  - name: test_sqlite_query_wrong_count
    description: 'Test sqlite_query_result with wrong expected count'
    function: sqlite.query_result
    expect_to_fail: true
    parameter:
      dst: '{{test_db}}'
      query: 'SELECT * FROM users'
      expected_rows: 10
  
  # Query with joins
  - name: test_sqlite_query_join
    description: 'Test sqlite_query_result with JOIN query'
    function: sqlite.query_result
    parameter:
      dst: '{{test_db}}'
      query: 'SELECT u.name, p.project_name FROM users u JOIN projects p ON u.id = p.user_id'
      expected_rows: 5
  
  # Complex queries
  - name: test_sqlite_query_aggregation
    description: 'Test sqlite_query_result with aggregation'
    function: sqlite.query_result
    parameter:
      dst: '{{test_db}}'
      query: 'SELECT role, COUNT(*) as count FROM users GROUP BY role'
      expected_rows: 3
  
  # Edge cases
  - name: test_sqlite_query_empty_db
    description: 'Test sqlite_query_result with empty database'
    function: sqlite.query_result
    parameter:
      dst: '{{empty_db}}'
      query: 'SELECT name FROM sqlite_master WHERE type="table"'
      expected_rows: 0
  
  - name: test_sqlite_query_invalid_table
    description: 'Test sqlite_query_result with invalid table'
    function: sqlite.query_result
    expect_to_fail: true
    parameter:
      dst: '{{test_db}}'
      query: 'SELECT * FROM nonexistent_table'
      expected_rows: 0
  
  - name: test_sqlite_query_file_not_found
    description: 'Test sqlite_query_result with non-existent database file'
    function: sqlite.query_result
    expect_to_fail: true
    parameter:
      dst: '{{test_dir}}/nonexistent.db'
      query: 'SELECT 1'
      expected_rows: 1

  # Tests using pre-created database with richer data
  - name: test_shared_db_department_count
    description: 'Test sqlite_query_result with department aggregation from shared DB'
    function: sqlite.query_result
    parameter:
      dst: '{{shared_db}}'
      query: 'SELECT department, COUNT(*) as count FROM users GROUP BY department ORDER BY department'
      expected_rows: 4

  - name: test_shared_db_salary_range
    description: 'Test sqlite_query_result with salary filtering from shared DB'
    function: sqlite.query_result
    parameter:
      dst: '{{shared_db}}'
      query: 'SELECT COUNT(*) as count FROM users WHERE salary BETWEEN 50000 AND 75000'
      expected_result: [{"count": 4}]

  - name: test_shared_db_audit_logs
    description: 'Test sqlite_query_result with audit log analysis from shared DB'
    function: sqlite.query_result
    parameter:
      dst: '{{shared_db}}'
      query: 'SELECT action, COUNT(*) as count FROM audit_logs WHERE success = 1 GROUP BY action ORDER BY count DESC'
      expected_rows: 6

  - name: test_shared_db_complex_join
    description: 'Test sqlite_query_result with complex multi-table JOIN from shared DB'
    function: sqlite.query_result
    parameter:
      dst: '{{shared_db}}'
      query: 'SELECT d.name as dept_name, COUNT(u.id) as user_count FROM departments d LEFT JOIN users u ON d.name = u.department GROUP BY d.name ORDER BY d.name'
      expected_rows: 4

actions:
  # Setup test environment
  - command:
      name: "Create Test Directory"
      description: "Create base directory for SQLite testing"
      command: "mkdir -p {{test_dir}}"
      shell: true
  
  # Copy pre-created database from shared data
  - command:
      name: "Copy Test Database"
      description: "Copy pre-created SQLite database with comprehensive test data"
      command: "cp {{shared_db}} {{test_db}}"
      shell: true
  
  # Create empty database
  - command:
      name: "Create Empty Database"
      description: "Create empty SQLite database"
      command: "sqlite3 {{empty_db}} 'SELECT 1;'"
      shell: true
  
  # Run all SQLite tests
  - test: test_sqlite_query_count
  - test: test_sqlite_query_specific_result
  - test: test_sqlite_query_all_users
  - test: test_sqlite_query_single_user
  - test: test_sqlite_query_no_results
  - test: test_sqlite_query_wrong_count
  - test: test_sqlite_query_join
  - test: test_sqlite_query_aggregation
  - test: test_sqlite_query_empty_db
  - test: test_sqlite_query_invalid_table
  - test: test_sqlite_query_file_not_found

  # Run tests using pre-created database
  - test: test_shared_db_department_count
  - test: test_shared_db_salary_range
  - test: test_shared_db_audit_logs
  - test: test_shared_db_complex_join
  
  # Cleanup
  - command:
      name: "Cleanup Test Directory"
      description: "Remove test directory and files"
      command: "rm -rf {{test_dir}}"
      shell: true