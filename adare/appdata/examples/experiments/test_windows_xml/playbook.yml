settings:
 idle: 1.0
 timeout: 120
 screenshot:
   format: "png"
   quality: 95
 continue_on_test_failure: true

# Variables for Windows XML testing
variables:
 fixed_timestamp:
   type: string
   value: "2025-01-15T14:30:00"
   description: "Fixed timestamp for consistent testing"

 username:
   type: string
   value: "adare"
   description: "System username"

 test_dir:
   type: path
   value: "C:\\Users\\{{username}}\\test_xml"
   description: "Base directory for XML testing"

 config_xml:
   type: path
   value: "{{test_dir}}\\config.xml"
   description: "Configuration XML file"

 users_xml:
   type: path
   value: "{{test_dir}}\\users.xml"
   description: "Users XML file"

 nested_xml:
   type: path
   value: "{{test_dir}}\\nested.xml"
   description: "Deeply nested XML file"

 app_config_xml:
   type: path
   value: "{{test_dir}}\\app.config"
   description: ".NET app configuration file"

 # Placeholder examples for advanced matching
 version_regex:
   type: regex
   value: '^\d+\.\d+\.\d+\.\d+$'
   description: "Regex pattern for Windows version format"


 malformed_xml:
   type: path
   value: "{{test_dir}}\\malformed.xml"
   description: "Malformed XML file for error handling tests"

actions:
 - command:
     name: "Create test directory for XML files"
     description: "Create base directory for XML testing"
     command: "mkdir \"{{test_dir}}\""
     shell: true

 - save_timestamp:
     name: "Save Current Timestamp"
     description: "Save current timestamp in 'now' variable for timestamp tolerance tests"
     variable: "now"

 - command:
     name: "Create sample config XML"
     description: "Create configuration XML file with Windows-specific elements"
     command: |
       echo ^<?xml version="1.0" encoding="UTF-8"?^> > "{{config_xml}}"
       echo ^<configuration^> >> "{{config_xml}}"
       echo   ^<appSettings^> >> "{{config_xml}}"
       echo     ^<add key="DatabaseConnection" value="Server=localhost;Database=TestDB" /^> >> "{{config_xml}}"
       echo     ^<add key="LogLevel" value="INFO" /^> >> "{{config_xml}}"
       echo     ^<add key="EnableSSL" value="true" /^> >> "{{config_xml}}"
       echo   ^</appSettings^> >> "{{config_xml}}"
       echo   ^<system.web^> >> "{{config_xml}}"
       echo     ^<httpRuntime maxRequestLength="4096" /^> >> "{{config_xml}}"
       echo     ^<compilation debug="false" targetFramework="4.8" /^> >> "{{config_xml}}"
       echo   ^</system.web^> >> "{{config_xml}}"
       echo   ^<version^>2.1.0.0^</version^> >> "{{config_xml}}"
       echo   ^<timestamp^>{{fixed_timestamp}}^</timestamp^> >> "{{config_xml}}"
       echo ^</configuration^> >> "{{config_xml}}"
     shell: true

 - command:
     name: "Create users XML file"
     description: "Create users XML file with Windows user records"
     command: |
       echo ^<?xml version="1.0" encoding="UTF-8"?^> > "{{users_xml}}"
       echo ^<users^> >> "{{users_xml}}"
       echo   ^<user id="1"^> >> "{{users_xml}}"
       echo     ^<name^>Administrator^</name^> >> "{{users_xml}}"
       echo     ^<email^>admin@company.com^</email^> >> "{{users_xml}}"
       echo     ^<domain^>WORKGROUP^</domain^> >> "{{users_xml}}"
       echo     ^<active^>true^</active^> >> "{{users_xml}}"
       echo   ^</user^> >> "{{users_xml}}"
       echo   ^<user id="2"^> >> "{{users_xml}}"
       echo     ^<name^>TestUser^</name^> >> "{{users_xml}}"
       echo     ^<email^>testuser@company.com^</email^> >> "{{users_xml}}"
       echo     ^<domain^>WORKGROUP^</domain^> >> "{{users_xml}}"
       echo     ^<active^>true^</active^> >> "{{users_xml}}"
       echo   ^</user^> >> "{{users_xml}}"
       echo   ^<user id="3"^> >> "{{users_xml}}"
       echo     ^<name^>Guest^</name^> >> "{{users_xml}}"
       echo     ^<email^>guest@company.com^</email^> >> "{{users_xml}}"
       echo     ^<domain^>WORKGROUP^</domain^> >> "{{users_xml}}"
       echo     ^<active^>false^</active^> >> "{{users_xml}}"
       echo   ^</user^> >> "{{users_xml}}"
       echo ^</users^> >> "{{users_xml}}"
     shell: true

 - command:
     name: "Create nested XML structure"
     description: "Create deeply nested XML for Windows registry testing"
     command: |
       echo ^<?xml version="1.0" encoding="UTF-8"?^> > "{{nested_xml}}"
       echo ^<root^> >> "{{nested_xml}}"
       echo   ^<system^> >> "{{nested_xml}}"
       echo     ^<windows^> >> "{{nested_xml}}"
       echo       ^<registry^> >> "{{nested_xml}}"
       echo         ^<hklm^> >> "{{nested_xml}}"
       echo           ^<software^> >> "{{nested_xml}}"
       echo             ^<data^>Registry nested value^</data^> >> "{{nested_xml}}"
       echo             ^<count^>256^</count^> >> "{{nested_xml}}"
       echo           ^</software^> >> "{{nested_xml}}"
       echo         ^</hklm^> >> "{{nested_xml}}"
       echo       ^</registry^> >> "{{nested_xml}}"
       echo     ^</windows^> >> "{{nested_xml}}"
       echo   ^</system^> >> "{{nested_xml}}"
       echo   ^<metadata^> >> "{{nested_xml}}"
       echo     ^<created^>{{fixed_timestamp}}^</created^> >> "{{nested_xml}}"
       echo     ^<platform^>Windows 11^</platform^> >> "{{nested_xml}}"
       echo   ^</metadata^> >> "{{nested_xml}}"
       echo ^</root^> >> "{{nested_xml}}"
     shell: true

 - command:
     name: "Create .NET app.config file"
     description: "Create .NET application configuration file"
     command: |
       echo ^<?xml version="1.0" encoding="utf-8"?^> > "{{app_config_xml}}"
       echo ^<configuration^> >> "{{app_config_xml}}"
       echo   ^<startup^> >> "{{app_config_xml}}"
       echo     ^<supportedRuntime version="v4.0" sku=".NETFramework,Version=v4.8" /^> >> "{{app_config_xml}}"
       echo   ^</startup^> >> "{{app_config_xml}}"
       echo   ^<appSettings^> >> "{{app_config_xml}}"
       echo     ^<add key="Environment" value="Development" /^> >> "{{app_config_xml}}"
       echo     ^<add key="ApiUrl" value="https://api.example.com" /^> >> "{{app_config_xml}}"
       echo   ^</appSettings^> >> "{{app_config_xml}}"
       echo   ^<connectionStrings^> >> "{{app_config_xml}}"
       echo     ^<add name="DefaultConnection" connectionString="Data Source=localhost;Initial Catalog=TestDB" /^> >> "{{app_config_xml}}"
       echo   ^</connectionStrings^> >> "{{app_config_xml}}"
       echo ^</configuration^> >> "{{app_config_xml}}"
     shell: true

 - command:
     name: "Create timestamped XML file"
     description: "Create XML file with actual current timestamp for tolerance testing"
     command: |
       echo ^<?xml version="1.0" encoding="UTF-8"?^> > "{{test_dir}}\\timestamped.xml"
       echo ^<log^> >> "{{test_dir}}\\timestamped.xml"
       echo   ^<entry^> >> "{{test_dir}}\\timestamped.xml"
       powershell -command "echo '<timestamp>' + (Get-Date -Format 'yyyy-MM-ddTHH:mm:ss') + '</timestamp>'" >> "{{test_dir}}\\timestamped.xml"
       echo     ^<level^>INFO^</level^> >> "{{test_dir}}\\timestamped.xml"
       echo     ^<message^>Test log entry^</message^> >> "{{test_dir}}\\timestamped.xml"
       echo   ^</entry^> >> "{{test_dir}}\\timestamped.xml"
       echo ^</log^> >> "{{test_dir}}\\timestamped.xml"
     shell: true

 - command:
     name: "Create malformed XML for error testing"
     description: "Create malformed XML file for validation testing"
     command: |
       echo ^<?xml version="1.0" encoding="UTF-8"?^> > "{{malformed_xml}}"
       echo ^<configuration^> >> "{{malformed_xml}}"
       echo   ^<appSettings^> >> "{{malformed_xml}}"
       echo     ^<add key="TestKey" value="TestValue"^> >> "{{malformed_xml}}"
       echo   ^</appSettings^> >> "{{malformed_xml}}"
     shell: true

# Test section - Windows XML-specific forensic tests
tests:
 - name: "Config root element exists"
   function: xml.element_exists
   parameter:
     dst: "{{config_xml}}"
     xpath: "./configuration"

 - name: "App settings section exists"
   function: xml.element_exists
   parameter:
     dst: "{{config_xml}}"
     xpath: ".//appSettings"

 - name: "Database connection configured"
   function: xml.attribute_matches
   parameter:
     dst: "{{config_xml}}"
     xpath: ".//add[@key='DatabaseConnection']"
     attribute: "value"
     expected_value: "Server=localhost;Database=TestDB"

 - name: "Version matches Windows pattern"
   function: xml.element_text_matches
   parameter:
     dst: "{{config_xml}}"
     xpath: ".//version"
     expected_text: "{{version_regex}}"
     regex_match: true

 - name: "SSL is enabled"
   function: xml.attribute_matches
   parameter:
     dst: "{{config_xml}}"
     xpath: ".//add[@key='EnableSSL']"
     attribute: "value"
     expected_value: "true"

 - name: "Active users exist"
   function: xml.element_exists
   parameter:
     dst: "{{users_xml}}"
     xpath: ".//user[active='true']"

 - name: "Correct number of Windows users"
   function: xml.element_count
   parameter:
     dst: "{{users_xml}}"
     xpath: ".//user"
     expected_count: 3

 - name: "Deep registry data accessible"
   function: xml.element_text_matches
   parameter:
     dst: "{{nested_xml}}"
     xpath: ".//hklm/software/data"
     expected_text: "Registry nested value"

 - name: "Platform is Windows 11"
   function: xml.element_text_matches
   parameter:
     dst: "{{nested_xml}}"
     xpath: ".//platform"
     expected_text: "Windows 11"

 - name: ".NET Framework version configured"
   function: xml.attribute_matches
   parameter:
     dst: "{{app_config_xml}}"
     xpath: ".//supportedRuntime"
     attribute: "sku"
     expected_value: ".NETFramework,Version=v4.8"

 - name: "Fixed timestamp matches"
   function: xml.element_text_matches
   parameter:
     dst: "{{config_xml}}"
     xpath: ".//timestamp"
     expected_text: "{{fixed_timestamp}}"

 - name: "Dynamic timestamp with tolerance"
   function: xml.element_text_matches
   parameter:
     dst: "{{test_dir}}\\timestamped.xml"
     xpath: ".//timestamp"
     expected_text: "{{ now | tolerance(30) | format('%Y-%m-%dT%H:%M:%S') }}"

 - name: "Config XML is well-formed"
   function: standard.file_exists
   parameter:
     dst: "{{config_xml}}"

 - name: "App.config is well-formed"
   function: standard.file_exists
   parameter:
     dst: "{{app_config_xml}}"

 - name: "Malformed XML fails validation"
   function: standard.file_exists
   expect_to_fail: false
   parameter:
     dst: "{{malformed_xml}}"