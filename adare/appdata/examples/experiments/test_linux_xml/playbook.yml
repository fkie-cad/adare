settings:
 idle: 1.0
 timeout: 120
 screenshot:
   format: "png"
   quality: 95
 continue_on_test_failure: true

# Variables for Linux XML testing
variables:
 fixed_timestamp:
   type: string
   value: "2025-01-15T14:30:00"
   description: "Fixed timestamp for consistent testing"

 username:
   type: string
   value: "adare"
   description: "System username"

 test_dir:
   type: path
   value: "/home/{{username}}/test_xml"
   description: "Base directory for XML testing"

 config_xml:
   type: path
   value: "{{test_dir}}/config.xml"
   description: "Configuration XML file"

 users_xml:
   type: path
   value: "{{test_dir}}/users.xml"
   description: "Users XML file"

 nested_xml:
   type: path
   value: "{{test_dir}}/nested.xml"
   description: "Deeply nested XML file"

 # Placeholder examples for advanced matching
 version_regex:
   type: regex
   value: '^\d+\.\d+\.\d+$'
   description: "Regex pattern for version matching"

 malformed_xml:
   type: path
   value: "{{test_dir}}/malformed.xml"
   description: "Malformed XML file for error handling tests"

actions:
 - command:
     name: "Create test directory for XML files"
     description: "Create base directory for XML testing"
     command: "mkdir -p {{test_dir}}"
     shell: true

 - save_timestamp:
     name: "Save Current Timestamp"
     description: "Save current timestamp in 'now' variable for timestamp tolerance tests"
     variable: "now"

 - command:
     name: "Create sample config XML"
     description: "Create configuration XML file with various elements"
     command: |
       cat > {{config_xml}} << 'EOF'
       <?xml version="1.0" encoding="UTF-8"?>
       <configuration>
         <database>
           <host>localhost</host>
           <port>5432</port>
           <name>testdb</name>
         </database>
         <logging>
           <level>INFO</level>
           <file>/var/log/app.log</file>
         </logging>
         <features>
           <feature name="authentication" enabled="true"/>
           <feature name="caching" enabled="false"/>
         </features>
         <version>1.2.3</version>
         <timestamp>{{fixed_timestamp}}</timestamp>
       </configuration>
       EOF
     shell: true

 - command:
     name: "Create users XML file"
     description: "Create users XML file with multiple user records"
     command: |
       cat > {{users_xml}} << 'EOF'
       <?xml version="1.0" encoding="UTF-8"?>
       <users>
         <user id="1">
           <name>John Doe</name>
           <email>john@example.com</email>
           <role>admin</role>
           <active>true</active>
         </user>
         <user id="2">
           <name>Jane Smith</name>
           <email>jane@example.com</email>
           <role>user</role>
           <active>true</active>
         </user>
         <user id="3">
           <name>Bob Wilson</name>
           <email>bob@example.com</email>
           <role>user</role>
           <active>false</active>
         </user>
       </users>
       EOF
     shell: true

 - command:
     name: "Create nested XML structure"
     description: "Create deeply nested XML for complex XPath testing"
     command: |
       cat > {{nested_xml}} << 'EOF'
       <?xml version="1.0" encoding="UTF-8"?>
       <root>
         <level1>
           <level2>
             <level3>
               <level4>
                 <data>Deep nested value</data>
                 <count>42</count>
               </level4>
             </level3>
           </level2>
         </level1>
         <metadata>
           <created>{{fixed_timestamp}}</created>
           <author>Test System</author>
         </metadata>
       </root>
       EOF
     shell: true

 - command:
     name: "Create timestamped XML file"
     description: "Create XML file with actual current timestamp for tolerance testing"
     command: |
       cat > {{test_dir}}/timestamped.xml << EOF
       <?xml version="1.0" encoding="UTF-8"?>
       <log>
         <entry>
           <timestamp>$(date '+%Y-%m-%dT%H:%M:%S')</timestamp>
           <level>INFO</level>
           <message>Test log entry</message>
         </entry>
       </log>
       EOF
     shell: true

 - command:
     name: "Create malformed XML for error testing"
     description: "Create malformed XML file for validation testing"
     command: |
       cat > {{malformed_xml}} << 'EOF'
       <?xml version="1.0" encoding="UTF-8"?>
       <configuration>
         <database>
           <host>localhost</host>
           <port>5432
         </database>
       EOF
     shell: true

# Test section - XML-specific forensic tests
tests:
 - name: "Config root element exists"
   function: xml.element_exists
   parameter:
     dst: "{{config_xml}}"
     xpath: "./configuration"

 - name: "Database configuration exists"
   function: xml.element_exists
   parameter:
     dst: "{{config_xml}}"
     xpath: ".//database"

 - name: "Database host is localhost"
   function: xml.element_text_matches
   parameter:
     dst: "{{config_xml}}"
     xpath: ".//host"
     expected_text: "localhost"

 - name: "Version matches pattern"
   function: xml.element_text_matches
   parameter:
     dst: "{{config_xml}}"
     xpath: ".//version"
     expected_text: "{{version_regex}}"
     regex_match: true

 - name: "Authentication feature is enabled"
   function: xml.attribute_matches
   parameter:
     dst: "{{config_xml}}"
     xpath: ".//feature[@name='authentication']"
     attribute: "enabled"
     expected_value: "true"

 - name: "Active users exist"
   function: xml.element_exists
   parameter:
     dst: "{{users_xml}}"
     xpath: ".//user[active='true']"

 - name: "Correct number of users"
   function: xml.element_count
   parameter:
     dst: "{{users_xml}}"
     xpath: ".//user"
     expected_count: 3

 - name: "Deep nested data accessible"
   function: xml.element_text_matches
   parameter:
     dst: "{{nested_xml}}"
     xpath: ".//level4/data"
     expected_text: "Deep nested value"

 - name: "Timestamp within tolerance"
   function: xml.element_text_matches
   parameter:
     dst: "{{config_xml}}"
     xpath: ".//timestamp"
     expected_text: "{{fixed_timestamp}}"

 - name: "Dynamic timestamp with tolerance"
   function: xml.element_text_matches
   parameter:
     dst: "{{test_dir}}/timestamped.xml"
     xpath: ".//timestamp"
     expected_text: "{{ now | tolerance(30) | format('%Y-%m-%dT%H:%M:%S') }}"

 - name: "Config XML is well-formed"
   function: standard.file_exists
   parameter:
     dst: "{{config_xml}}"

 - name: "Malformed XML fails validation"
   function: standard.file_exists
   expect_to_fail: false
   parameter:
     dst: "{{malformed_xml}}"