settings:
  idle: 1.0
  timeout: 120
  screenshot:
    format: "png"
    quality: 95
  continue_on_test_failure: true

# Variables for Windows SQLite testing
variables:
  username:
    type: string
    value: "adare"
    description: "System username"
  
  test_dir:
    type: path
    value: "C:\\Users\\{{username}}\\test_sqlite"
    description: "Base directory for SQLite testing"
  
  test_db:
    type: path
    value: "{{test_dir}}\\test.db"
    description: "Test SQLite database"

  shared_db:
    type: path
    value: "{{experiment_dir}}\\shared\\data\\test.db"
    description: "Pre-created SQLite database with comprehensive test data"

# Test definitions for SQLite functions on Windows
tests:
  - name: test_sqlite_query_windows
    description: 'Test sqlite_query_result on Windows'
    function: sqlite.query_result
    parameter:
      dst: '{{test_db}}'
      query: 'SELECT COUNT(*) as count FROM users'
      expected_rows: 1

  - name: test_windows_shared_db
    description: 'Test sqlite_query_result with pre-created database on Windows'
    function: sqlite.query_result
    parameter:
      dst: '{{shared_db}}'
      query: 'SELECT COUNT(*) as count FROM users WHERE role = "Admin"'
      expected_result: [{"count": 2}]

  - name: test_windows_departments
    description: 'Test sqlite_query_result with department data on Windows'
    function: sqlite.query_result
    parameter:
      dst: '{{shared_db}}'
      query: 'SELECT name FROM departments ORDER BY name'
      expected_rows: 4

actions:
  # Setup test environment
  - command:
      name: "Create Test Directory"
      description: "Create base directory for SQLite testing"
      command: 'mkdir "{{test_dir}}"'
      shell: true
  
  - command:
      name: "Copy Test Database"
      description: "Copy pre-created SQLite database with comprehensive test data"
      command: 'copy "{{shared_db}}" "{{test_db}}"'
      shell: true
  
  # Run SQLite tests
  - test: test_sqlite_query_windows
  - test: test_windows_shared_db
  - test: test_windows_departments
  
  # Cleanup
  - command:
      name: "Cleanup Test Directory"
      description: "Remove test directory and files"
      command: 'rmdir /s /q "{{test_dir}}"'
      shell: true