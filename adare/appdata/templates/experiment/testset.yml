name: {{ name }}
tests:
  # Test to run before the experiment starts
  - name: initial_check
    description: 'Check initial conditions'
    function: file_does_not_exist
    parameters:
      dst: 'C:/Users/vagrant/Documents/testfile.txt'
  
  # Test to run after the experiment completes  
  - name: final_check
    description: 'Verify experiment succeeded'
    function: file_exists
    parameters:
      dst: 'C:/Users/vagrant/Documents/testfile.txt'

# Available test functions: file_exists, file_does_not_exist, registry_key_exists, etc.
# For complete list and advanced testing, see:
# https://docs.adare.example.com/experiments/testset-reference