settings:
  idle: 2.5
  timeout: 600
  screenshot:
    format: "jpg"
    quality: 80

variables:
  username: "testuser"
  password: "secret123"
  filepath: "/home/{{ username }}/testfile.txt"
  url: "https://example.com/{{ username }}"
  timeout_value: 30

actions:
  # Basic actions
  - command:
      name: "Setup Environment"
      description: "Create test directory"
      cmd: "mkdir -p /home/{{ username }}/testdir"
      timeout: 10
      
  - command:
      name: "Tool Command"
      description: "Run with specific tool"
      tool: "curl"
      command: "curl -o {{ filepath }} {{ url }}"
      cwd: "/tmp"
      env:
        USER: "{{ username }}"
        TIMEOUT: "{{ timeout_value }}"
      shell: true

  # Click actions with different targets
  - click:
      target:
        image: "button.png"
      description: "Click image target"
      
  - click:
      target:
        text: "Login"
      description: "Click text target"
      
  - click:
      target:
        position: [100, 200]
      description: "Click position target"

  # Other GUI actions
  - right_click:
      target:
        text: "File"
      description: "Right click on File"
      
  - double_click:
      target:
        image: "folder.png"
      description: "Double click folder"
      
  - drag:
      source:
        image: "file.png"
      destination:
        text: "Trash"
      description: "Drag file to trash"

  # Keyboard actions
  - keyboard:
      keys: "{{ username }}"
      description: "Type username"
      
  - keyboard:
      combination: ["ctrl", "c"]
      description: "Copy shortcut"
      
  - keyboard:
      keys: "test input"
      when:
        - exists:
            text: "Input Field"
      description: "Type when input field exists"

  # Other actions
  - idle:
      duration: 3.0
      description: "Wait 3 seconds"
      
  - scroll:
      direction: "down"
      amount: 5
      description: "Scroll down"
      
  - goto:
      target:
        position: [500, 300]
      description: "Move mouse to position"
      
  - screenshot:
      description: "Full screenshot"
      
  - screenshot:
      description: "Partial screenshot"
      x: 100
      y: 200
      width: 400
      height: 300
      
  - save_timestamp:
      variable: "TIMESTAMP.START"
      description: "Save start timestamp"

  # Test actions
  - test: "file_exists"
  
  - test:
      name: "network_test"
      description: "Run network connectivity test"

  # Block without conditions
  - block:
      description: "Simple block of actions"
      actions:
        - command:
            cmd: "echo 'Block action 1'"
        - idle:
            duration: 1.0
        - command:
            cmd: "echo 'Block action 2'"

  # Block with exists condition
  - block:
      description: "Block with exists condition"
      when:
        - exists:
            text: "Continue"
      actions:
        - click:
            target:
              text: "Continue"
        - keyboard:
            keys: "proceeding..."

  # Block with not_exists condition
  - block:
      description: "Block with not_exists condition"
      when:
        - not_exists:
            image: "error.png"
      actions:
        - command:
            cmd: "echo 'No error detected'"

  # Block with image condition
  - block:
      description: "Block with image condition"
      when:
        - exists:
            image: "dialog.png"
      actions:
        - click:
            target:
              text: "OK"
        - keyboard:
            combination: ["enter"]

  # Block with multiple conditions (should all be met)
  - block:
      description: "Block with multiple conditions"
      when:
        - exists:
            text: "Ready"
        - not_exists:
            image: "loading.png"
      actions:
        - command:
            cmd: "echo 'System is ready'"
        - screenshot:
            description: "Ready state screenshot"

  # Nested blocks
  - block:
      description: "Outer block"
      actions:
        - command:
            cmd: "echo 'Outer block start'"
        - block:
            description: "Inner block"
            when:
              - exists:
                  text: "Inner Condition"
            actions:
              - click:
                  target:
                    text: "Inner Button"
              - keyboard:
                  keys: "inner action"
        - command:
            cmd: "echo 'Outer block end'"

  # Complex command variations
  - command:
      name: "Complex Command"
      description: "Command with all options"
      cmd: "python3 -c \"print('Hello {{ username }}!')\""
      cwd: "{{ filepath | dirname }}"
      env:
        HOME: "/home/{{ username }}"
        PATH: "/usr/local/bin:/usr/bin:/bin"
      timeout: 60.0
      shell: true

  # Final actions
  - save_timestamp:
      variable: "TIMESTAMP.END"
      description: "Save end timestamp"
      
  - test: "cleanup_test"