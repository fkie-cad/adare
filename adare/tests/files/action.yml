settings:
  idle: 0.5
actions:
  - click:
      target:
        image: "button.png"
  - right_click:
      target:
        text: "Settings"
  - double_click:
      target:
        text: "File"
  - drag:
      source:
        text: "File"
      destination:
        text: "Folder"
  - keyboard:
      keys: "Hello from the other side"
      when:
        - exists:
            text: "Hello"
        - not_exists:
            image: "button.png"
  - keyboard:
      combination:
        - "Ctrl"
        - "Shift"
        - "A"
  - test:
      name: existencefile
      description: 'check if file exists'
  - idle:
      duration: 5
  - scroll:
      direction: "down"
      amount: 3
  - goto:
      target:
        text: "Settings"
  - block:
      actions:
        - click:
            target:
              text: "OK"
        - click:
            target:
              text: "Cancel"
      when:
        - exists:
            text: "OK"