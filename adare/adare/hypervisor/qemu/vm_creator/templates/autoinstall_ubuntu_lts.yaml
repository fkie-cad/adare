{# adare-template
schema: 1
id: ubuntu-lts
description: Ubuntu 22.04 / 24.04 LTS desktop (server ISO autoinstall)
maintainer: ADARE
revision: 2026-05-06
supports:
  - ubuntu2204
  - ubuntu2204arm64
  - ubuntu2404
  - ubuntu2404arm64
-#}
#cloud-config
autoinstall:
  version: 1
  locale: en_US.UTF-8
  keyboard:
    layout: us
  storage:
    layout:
      name: lvm
      sizing-policy: all
  identity:
    hostname: {{ hostname }}
    username: adare
    password: {{ password_hash }}
  ssh:
    install-server: true
    allow-pw: true
  packages:
    - ubuntu-desktop-minimal
    {% if setup_level >= 1 %}
    - qemu-guest-agent
    {% endif %}
    {% if setup_level >= 2 %}
    - gnome-screenshot
    - maim
    - xdotool
    - python3-pip
    - python3-tk
    {% endif %}
    - openssh-server
    - curl
    - wget
    - git
  late-commands:
    # Passwordless sudo for adare user
    - echo "adare ALL=(ALL) NOPASSWD:ALL" > /target/etc/sudoers.d/adare
    - chmod 440 /target/etc/sudoers.d/adare
    # GDM autologin with X11 (disable Wayland for PyAutoGUI compatibility)
    - mkdir -p /target/etc/gdm3
    - |
      printf '[daemon]\nAutomaticLoginEnable=true\nAutomaticLogin=adare\nWaylandEnable=false\n' > /target/etc/gdm3/custom.conf
    # Disable unattended upgrades to prevent interference during experiments
    - curtin in-target -- systemctl disable unattended-upgrades || true
    - curtin in-target -- apt-get remove -y unattended-upgrades || true
    # Disable APT periodic update/upgrade timers
    - curtin in-target -- systemctl disable apt-daily.timer || true
    - curtin in-target -- systemctl disable apt-daily-upgrade.timer || true
    - curtin in-target -- systemctl mask apt-daily.service || true
    - curtin in-target -- systemctl mask apt-daily-upgrade.service || true
    # Disable APT periodic updates via config
    - 'echo "APT::Periodic::Update-Package-Lists \"0\";" > /target/etc/apt/apt.conf.d/99disable-auto-updates'
    - 'echo "APT::Periodic::Unattended-Upgrade \"0\";" >> /target/etc/apt/apt.conf.d/99disable-auto-updates'
    - 'echo "APT::Periodic::Download-Upgradeable-Packages \"0\";" >> /target/etc/apt/apt.conf.d/99disable-auto-updates'
    # Disable snap auto-refresh
    - mkdir -p /target/etc/snap
    - 'echo "refresh.hold: forever" > /target/etc/snap/snapd.conf || true'
    - curtin in-target -- snap set system refresh.hold="$(date -d '+100 years' +%Y-%m-%dT%H:%M:%S%:z)" || true
    {% if setup_level >= 1 %}
    # Enable QEMU Guest Agent
    - curtin in-target -- systemctl enable qemu-guest-agent
    {% endif %}
    # Ensure adare user exists in target (cloud-init creates it on first boot, but we need it now)
    - curtin in-target -- id adare || curtin in-target -- useradd -m -u 1000 -G sudo -s /bin/bash adare
    - curtin in-target -- mkdir -p /home/adare
    - chown -R 1000:1000 /target/home/adare
    {% if setup_level >= 2 %}
    # Install Miniforge3 and conda env as root, then fix ownership
    - curtin in-target -- wget -q https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-{{ miniforge_arch }}.sh -O /tmp/miniforge.sh
    - curtin in-target -- chmod +x /tmp/miniforge.sh
    - curtin in-target -- bash /tmp/miniforge.sh -b -p /home/adare/.miniforge3
    - curtin in-target -- /home/adare/.miniforge3/bin/conda create -n pyadare python=3.10 pip -y
    - rm -f /target/tmp/miniforge.sh
    - chown -R 1000:1000 /target/home/adare
    {% endif %}
    # Disable screen blanking and lock for automated GUI testing
    - curtin in-target -- sudo -u adare dbus-launch gsettings set org.gnome.desktop.session idle-delay 0 || true
    - curtin in-target -- sudo -u adare dbus-launch gsettings set org.gnome.desktop.screensaver lock-enabled false || true
  shutdown: poweroff
