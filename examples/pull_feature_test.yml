# Test playbook for the new pull feature
# This demonstrates pulling files from VM to host artifacts directory

settings:
  idle: 1.0

actions:
  # Create a test file in the VM
  - command:
      name: "Create test file"
      description: "Create a test file to pull from VM"
      command: "echo 'This is a test file created in the VM' > /tmp/test_file.txt"
      shell: true

  # Create a test directory with multiple files
  - command:
      name: "Create test directory"
      description: "Create a directory with multiple files to test recursive pull"
      command: "mkdir -p /tmp/test_dir && echo 'File 1' > /tmp/test_dir/file1.txt && echo 'File 2' > /tmp/test_dir/file2.txt"
      shell: true

  # Pull the single file to artifacts directory
  - pull:
      source: "/tmp/test_file.txt"
      description: "Pull the test file to artifacts directory"

  # Pull the directory recursively with custom destination name
  - pull:
      source: "/tmp/test_dir"
      destination: "test_directory"
      recursive: true
      description: "Pull the test directory recursively with custom name"

  # Take a screenshot to show the final state
  - screenshot:
      description: "Final screenshot after pulling files"