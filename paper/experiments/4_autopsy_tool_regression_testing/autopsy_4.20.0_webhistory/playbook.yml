- name: test_columns_operating_system_information
  description: Validate Operating System Information sheet column headers
  function: excel.validate_columns
  parameter:
    dst: '{{ case_directory }}/Reports/*/Excel.xlsx'
    sheet: Operating System Information
    expected_columns:
    - Processor Architecture
    - Operating System Name
    - Install Date
    - Name
    - Owner
    - Path
    - Product ID
    - Temporary Files Directory
    - Source File
    - Tags
    column_row: 0
    allow_extra_columns: false
    allow_missing_columns: false
    ignore_order: false
- name: test_content_operating_system_information
  description: Compare Operating System Information sheet data - flexible row matching
  function: excel.compare_rows
  parameter:
    dst: '{{ case_directory }}/Reports/*/Excel.xlsx'
    sheet: Operating System Information
    reference_file: '{{ adare_shared_data }}/Report_4.20.0_reference.xlsx'
