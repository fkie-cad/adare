actions:
- command:
    command: r"$s=(New-Object -ComObject WScript.Shell).CreateShortcut("C:\Users\Public\Desktop\Autopsy
      {{ autopsy_version }}.lnk"); $s.Arguments='--userdir "' + $env:LOCALAPPDATA
      + '\autopsycustom"'; $s.Save()"
    shell: true
    admin: true
  description: Adjust the userdir to avoid issues due to different versions being
    installed on the system
- click:
    type: double
    target:
      text: '{{ autopsy_version }}'
- wait_until:
    initial_delay: 15
    check_interval: 15
    condition:
      exists:
        text: Central Repository
    timeout: 120
- click:
    target:
      text: Central Repository
- keyboard:
    key: enter
- wait_until:
    condition:
      exists:
        text: New Case
    skip:
      idle: 2
      pixel_change:
        below: 20
- click:
    target:
      image: case.png
      strategy:
        ClosestToStrategy:
          text: New Case
- keyboard:
    text: '{{ case_name }}'
- keyboard:
    key: tab
- keyboard:
    text: '{{ adare_user_documents | win_path }}'
- keyboard:
    key: tab
- keyboard:
    key: tab
- keyboard:
    key: enter
  description: 'Case Information: Next'
- keyboard:
    key: enter
  description: 'Optional Information: Next'
- wait_until:
    initial_delay: 30
    check_interval: 10
    condition:
      exists:
        text: Hosts are used
    timeout: 90
- keyboard:
    key: enter
  description: Select Host
- keyboard:
    key: enter
  description: Select Data Source Type Disk Image
- keyboard:
    text: r"{{ adare_project_shared | win_path }}\data\2020JimmyWilson.E01"
- idle:
    duration: 5
  description: Wait till Next Button becomes clickable
- keyboard:
    key: enter
  description: 'Select Data Source: Next'
- click:
    target:
      text: Deselect All
- click:
    target:
      text: Recent Activity
  description: Toggle Recent Activity
- keyboard:
    combination:
    - shift
    - tab
  description: Toggle Recent Activity
- keyboard:
    combination:
    - shift
    - tab
  description: Toggle Recent Activity
- keyboard:
    key: space
  description: Toggle Recent Activity
- click:
    target:
      text: Next
- wait_until:
    condition:
      exists:
        text: View Log
    initial_delay: 30
    check_interval: 10
- click:
    target:
      text: Finish
- click:
    target:
      text: Help
      offset:
        x: 30
        y: 0
        base: center-right
- keyboard:
    combination:
    - win
    - up
  description: Maximize the windows
- wait_until:
    condition:
      exists:
        text: Web History
    timeout: 180
- click:
    target:
      image: generate_report.png
- click:
    target:
      text: Excel
- keyboard:
    key: enter
  description: 'Select and Configure Report Modules: Next'
- keyboard:
    key: enter
  description: 'Select which data source(s) to include: Next'
- keyboard:
    key: enter
  description: 'Configure Report: Finish'
- idle:
    duration: 30
  description: Wait for report generation to complete
- command:
    command: r"Get-Item "{{ case_directory | win_path }}\Reports\*\Excel.xlsx" | Copy-Item
      -Destination "{{ adare_shared_data | win_path }}\Report_{{ autopsy_version }}.xlsx""
    shell: true
- test: test_report_file_exists
- test: test_sheet_summary_exists
- test: test_sheet_operating_system_information_exists
- test: test_sheet_web_bookmarks_exists
- test: test_sheet_web_cookies_exists
- test: test_sheet_run_programs_exists
- test: test_sheet_web_search_exists
- test: test_sheet_data_source_usage_exists
- test: test_sheet_web_categories_exists
- test: test_sheet_installed_programs_exists
- test: test_sheet_recent_documents_exists
- test: test_sheet_recycle_bin_exists
- test: test_sheet_shell_bags_exists
- test: test_sheet_usb_device_attached_exists
- test: test_sheet_web_history_exists
- test: test_sheet_tagged_files_exists
