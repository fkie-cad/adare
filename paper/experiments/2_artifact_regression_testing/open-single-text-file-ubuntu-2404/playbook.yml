actions:
  - command:
      name: "Ensure recently-used.xbel is absent"
      command: "rm -f /home/adare/.local/share/recently-used.xbel"

  - command:
      name: "Create text file to be opened"
      command: "echo 'This is test text' > {{ text_file }}"
      shell: true

  - click:
      target:
        image: "filemanager-app.png"

  - idle:
      duration: 5

  - click:
      target:
        text: "Documents"
        strategy:
          SweepStrategy:
            index: 2
      description: "Click on the Documents folder"

  - click:
      type: "double"
      target:
        text: "adare.txt"
      description: "Click on the adare.txt file"

  - test: "recently_used_xbel_exists"


tests:
  - name: "recently_used_xbel_exists"
    description: "Test if the recently-used.xbel exists"
    function: "file_exists"
    parameter:
      dst: "/home/adare/.local/share/recently-used.xbel"


variables:
  text_file:
    type: "path"
    value: "/home/adare/Documents/adare.txt"

