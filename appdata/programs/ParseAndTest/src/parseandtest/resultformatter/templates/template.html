<!DOCTYPE html>
<html lang="en">
<style>
    .active_row{
        --box-shadow-color: grey;
        box-shadow: -3px 0 0 0 var(--box-shadow-color);
    }
</style>
<head>
    <meta charset="UTF-8">
    <title>Experiment Results</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <div class="row">
            <div>
                <h2 class="text-capitalize">{{ title }}</h2>
                <p class='attribute'><strong>Time: </strong>{{ date }}</p>
                <!-- <p class='attribute'><strong>Parser: </strong>{{ parser }}</p> -->
            </div>
        </div>
        <div class="row">
            <div>
                <table class='table table-sm table-hover table-responsive'>
                    <thead>
                        <th>Test Name</th>
                        <th>Test Function</th>
                        <th>Status</th>
                        <th></th>
                    </thead>
                    <tbody>
                    {% for o in outcome %}
                        <tr class="clickable_row">
                            <td>{{ o.name }}</td>
                            <td><p data-bs-toggle="tooltip" data-bs-html="true" title="{{ o.function_description }}">{{ o.function }}</p></td>
                            <td>
                                {{ o.result.status }}
                            </td>
                            <td>
                                <span style="display:block; width:2em; border-radius: 6px; text-align: center; height: 2em; background: {{ o.result.backgroundcolor }}; float: right">
                                </span>
                            </td>
                        </tr>
                        <tr class="details" style="display:none; background: lightgrey">
                            <td colspan="4">
                                <div style="margin-left: 4em">
                                    <p>description: {{ o.description }}</p>
                                    {% for detailname, detail in o.details.items() %}
                                    <p>{{ detailname }}: {{ detail }} </p>
                                    {% endfor %}
                                </div>
                            </td>
                        </tr>
                    {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>


<script type="text/javascript">
    $(document).ready(function(){
        $('[data-bs-toggle="tooltip"]').tooltip();
        $('.clickable_row').on('click', '', function(e){
            e.preventDefault();
            e.stopImmediatePropagation();
            var $this = $(this);
            var $nextRow = $this.closest('tr').next('tr');
            if ($this.hasClass('active_row')){
                $this.removeClass('active_row');
                $nextRow.removeClass('active_row');
            }else{
                let color = $this.children('td').eq(3).children('span').eq(0).css('background-color');
                $this.addClass('active_row');
                $nextRow.addClass('active_row');
                $this.css('--box-shadow-color', color);
                $nextRow.css('--box-shadow-color', color);
            }
            $nextRow.slideToggle("fast");
        });
    });
</script>
