- name: contenttrashbinfiles
  description: "check content of USB Trash Bin"
  type: dir_content
  params:
    files: [testfile]
    dst: /mnt/nfs/.Trash-1000/files/
- name: contenttrashbininfo
  description: "check content of USB Trash Bin"
  type: dir_content
  params:
    files: [testfile.trashinfo]
    dst: /mnt/nfs/.Trash-1000/info/
- name: existencefilemetadata
  description: "check if deletion metadata for file is exisiting"
  type: is_file
  params:
    dst: /mnt/nfs/.Trash-1000/info/testfile.trashinfo
- name: checkcontentmetadata
  description: "check if deletion metadata match predictet format"
  type: regex_match
  params:
    regex: \[Trash Info\]\nPath=testfile\nDeletionDate=[0-9][0-9][0-9][0-9]-[0-3][0-9]-[0-3][0-9]T[0-2][0-9]:[0-5][0-9]:[0-5][0-9]\n
    dst: /mnt/nfs/.Trash-1000/info/testfile.trashinfo
- name: checkdeletiontimestamp
  description: "check if deletion timestamp matches the time"
  type: check_timestamp
  params:
    tolerance: 30
    dst: /mnt/nfs/.Trash-1000/info/testfile.trashinfo