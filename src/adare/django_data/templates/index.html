<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% include "imports.html" %}

    <title>search</title>
</head>
<header>
    {% include "navbar/navbar.html" %}
</header>
<body>
    {% block content %}
        <div class="container-fluid">
            <div class="row p-3">
                <div class="col-8" id="table">
                    <table id="experiment_table" class="table" data-show-columns="true" data-search="true" data-pagination="true" data-resizable="true">
                    </table>
                </div>

                <div class="col" id="filter">
                    {% include "search/search_form.html" %}
                </div>
                <div class="col-auto">
                    <div class="d-flex justify-content-end">
                        <button type="button" class="btn btn-primary btn-sm" id="table_settings"><span class="bi-gear" id="table_settings_icon" style="font-size: 1.25rem"></span>&nbsp;</button>
                    </div>
                </div>
            </div>
        </div>
    {% endblock content %}
</body>
</html>
