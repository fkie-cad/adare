<div class="card h-100">
    <table class="table table-striped h-100 m-0 align-middle">
        <thead>
            <tr>
                <th scope="col" colspan="2" class="text-white text-center bg-primary">os information</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row">os</th>
                <td>{{ os }}</td>
            </tr>
            <tr>
                <th scope="row">distribution</th>
                <td>{{ distribution }}</td>
            </tr>
            <tr>
                <th scope="row">version</th>
                <td>{{ version }}</td>
            </tr>
            <tr>
                <th scope="row">language</th>
                <td>{{ language }}</td>
            </tr>
            <tr>
                <th scope="row">architecture</th>
                <td>{{ architecture }}</td>
            </tr>
        </tbody>
    </table>
</div>
